// FILE LOCATION: android/app/build.gradle
plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// ── Load keystore properties ──────────────────────────────────────────────────
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.monusidhar.ielts_speaking_2026"
    compileSdkVersion 36
    ndkVersion "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.monusidhar.ielts_speaking_2026"
        minSdkVersion flutter.minSdkVersion          // Required for google_mobile_ads
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true      // Required for large apps
    }

    // ── Signing configs ───────────────────────────────────────────────────────
    signingConfigs {
        release {
            keyAlias     keystoreProperties['keyAlias']     ?: 'upload'
            keyPassword  keystoreProperties['keyPassword']  ?: ''
            storeFile    keystoreProperties['storeFile']
                             ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword'] ?: ''
        }
    }

    buildTypes {
        release {
            signingConfig   signingConfigs.release
            minifyEnabled   true    // Shrinks code size
            shrinkResources true    // Removes unused resources
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                          'proguard-rules.pro'

            // ✅ Embeds native debug symbols in the bundle for Play Console crash reporting
            // ndk {
            //     debugSymbolLevel 'FULL'
            // }
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }

    // ✅ Preserve .so files so symbols are available for crash analysis
    // packagingOptions {
    //     doNotStrip "**/*.so"
    // }


}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:2.1.0"  // ✅
    implementation 'androidx.multidex:multidex:2.0.1'

    // ── Play Core split libraries (replaces incompatible play:core:1.10.3) ────
    implementation 'com.google.android.play:app-update:2.1.0'
    implementation 'com.google.android.play:review:2.0.1'
    implementation 'com.google.android.play:feature-delivery:2.1.0'
    implementation 'com.facebook.android:audience-network-sdk:6.+'
    implementation 'com.unity3d.ads:unity-ads:4.12.+'
}
